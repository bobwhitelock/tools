<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 24px; margin-bottom: 4px; }
    h2 { font-size: 16px; font-weight: 600; color: #555; margin: 28px 0 10px; text-transform: uppercase; letter-spacing: .5px; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    li a { display: flex; align-items: baseline; gap: 8px; padding: 10px 14px; border-radius: 8px; text-decoration: none; color: #1a1a1a; border: 1px solid #e3e3e3; background: #fff; }
    li a:hover { border-color: #db4035; background: #fff8f8; }
    .pr-num { font-size: 12px; font-weight: 700; color: #888; flex-shrink: 0; }
    .pr-title { font-size: 15px; }
    #pr-list .loading { color: #888; font-size: 14px; padding: 6px 0; }
  </style>
</head>
<body>
  <h1>Tools</h1>

  <h2>Tools</h2>
  <ul>
    <li><a href="tools/todoist-triage.html">Todoist Triage</a></li>
  </ul>

  <h2>Preview Deploys</h2>
  <ul id="pr-list"><li class="loading">Loading open PRs…</li></ul>

  <script>
    fetch('https://api.github.com/repos/bobwhitelock/tools/pulls?state=open&per_page=50')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(prs => {
        const list = document.getElementById('pr-list');
        if (!prs.length) {
          list.innerHTML = '<li class="loading">No open PRs.</li>';
          return;
        }
        list.innerHTML = prs.map(pr => `
          <li>
            <a href="https://tools.bobwhitelock.co.uk/pr-${pr.number}/" target="_blank" rel="noopener">
              <span class="pr-num">#${pr.number}</span>
              <span class="pr-title">${pr.title.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
            </a>
          </li>
        `).join('');
      })
      .catch(() => {
        document.getElementById('pr-list').innerHTML = '<li class="loading">Could not load PRs.</li>';
      });
  </script>
</body>
</html>
